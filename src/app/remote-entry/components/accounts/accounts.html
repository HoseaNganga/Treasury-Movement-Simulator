<div class="">
  <mat-card class="p-4">
    <h2 class="text-xl font-semibold mb-4">Accounts</h2>
    <div style="overflow-x: auto">
      <table
        mat-table
        [dataSource]="dataSource"
        class="mat-elevation-z4 w-full"
      >
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let account">{{ account.id }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Account Name</th>
          <td mat-cell *matCellDef="let account">{{ account.name }}</td>
        </ng-container>

        <ng-container matColumnDef="currency">
          <th mat-header-cell *matHeaderCellDef>Currency</th>
          <td mat-cell *matCellDef="let account">{{ account.currency }}</td>
        </ng-container>

        <ng-container matColumnDef="balance">
          <th mat-header-cell *matHeaderCellDef>Balance</th>
          <td mat-cell *matCellDef="let account">
            {{ account.balance | number: '1.0-0' }}
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let account">
            <button
              mat-icon-button
              color="primary"
              matTooltip="Transfer Funds"
              [routerLink]="['/transaction/transfer', account.id]"
            >
              <mat-icon>swap_horiz</mat-icon>
            </button>
            <button
              mat-icon-button
              color="accent"
              matTooltip="View Account"
              [routerLink]="['/accounts', account.id]"
            >
              <mat-icon>visibility</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  </mat-card>
</div>
