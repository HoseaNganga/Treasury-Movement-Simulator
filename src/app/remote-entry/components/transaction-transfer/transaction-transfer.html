<div class="">
  <div class="bg-gray-200 p-4 flex items-center gap-2 mb-4">
    <span class="text-black font-semibold">Transcation Transfer</span>
  </div>
  <mat-card>
    <h2 class="text-xl font-semibold mb-4">Transfer Funds</h2>
    <form [formGroup]="transferForm" (ngSubmit)="submitTransfer()">
      <div class="grid gap-4">
        <mat-form-field appearance="outline">
          <mat-label>From Account</mat-label>
          <input matInput [value]="fromAccount?.name" disabled />
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>To Account</mat-label>
          <mat-select formControlName="toId">
            <mat-option
              *ngFor="let acc of allAccounts"
              [value]="acc.id"
              [disabled]="acc.id === fromAccount?.id"
            >
              {{ acc.name }} ({{ acc.currency }})
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Amount</mat-label>
          <input matInput type="number" formControlName="amount" />
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Note</mat-label>
          <textarea matInput formControlName="note"></textarea>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Scheduled Date</mat-label>
          <input
            matInput
            [matDatepicker]="picker"
            formControlName="scheduledDate"
          />
          <mat-datepicker-toggle
            matSuffix
            [for]="picker"
          ></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <div *ngIf="exchangeRate" class="p-2">
          <p class="text-sm text-blue-700">
            Exchange Rate: <strong>{{ exchangeRate }}</strong>
          </p>
          <p class="text-sm text-green-700">
            Converted Amount:
            <strong>{{ convertedAmount | number: '1.2-2' }}</strong>
          </p>
        </div>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="transferForm.invalid"
          class="!mb-4 !w-1/6 !m-auto"
        >
          Submit Transfer
        </button>
      </div>
    </form>
  </mat-card>
</div>
